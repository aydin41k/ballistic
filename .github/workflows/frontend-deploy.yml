# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Frontend Deploy

on:
  push:
    branches:
      - master
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend-deploy.yml"

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: npm install

      - name: Upload source code for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            apps/frontend
            !apps/frontend/node_modules
            !apps/frontend/.git
            !apps/frontend/.github
            !apps/frontend/.cursor

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_139AEFA696064113AAFB51FF4CAA7401 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C354F2986A244CE38C495682FA597850 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_950D1640C0BC48CE8567A22B64E8ACF4 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "ballist"
          slot-name: "Production"
          package: .
          startup-command: "npm start"
